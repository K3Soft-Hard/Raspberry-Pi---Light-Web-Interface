<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <script src="/auth.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP5a Video Player</title>
    <style>
        /* Modern YouTube UI Variables */
        :root { 
            --bg: #0f0f0f; --text: #ffffff; --yt-red: #ff0000; 
            --card-hover: #272727; --input: #121212; --border: #333;
        }

        /* Light Mode Variables */
        [data-theme="light"] {
            --bg: #ffffff; --text: #0f0f0f; --yt-red: #cc0000; 
            --card-hover: #f2f2f2; --input: #f1f1f1; --border: #e5e5e5;
        }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: "Roboto", Arial, sans-serif; transition: background 0.2s;
        }

        /* Header Layout */
        header { 
            height: 56px; display: flex; align-items: center; padding: 0 20px; 
            background: var(--bg); position: sticky; top: 0; z-index: 10; 
            border-bottom: 1px solid var(--border);
        }
        .logo { color: var(--yt-red); font-weight: bold; font-size: 20px; flex: 1; cursor: pointer; }
        
        .search-area { flex: 2; display: flex; justify-content: center; }
        #search { 
            background: var(--input); border: 1px solid var(--border); 
            color: var(--text); padding: 10px 20px; border-radius: 40px; 
            width: 80%; max-width: 500px; outline: none; transition: 0.3s;
        }
        #search:focus { border-color: #3ea6ff; width: 90%; }

        .header-actions { flex: 1; display: flex; justify-content: flex-end; gap: 10px; }

        /* Main View */
        .container { display: flex; padding: 20px; gap: 24px; max-width: 1700px; margin: auto; }
        .main-player { flex: 3; }
        .sidebar { flex: 1; min-width: 350px; height: 85vh; overflow-y: auto; padding-right: 5px; }

        video { 
            width: 100%; aspect-ratio: 16/9; background: #000; 
            border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Playlist Item Styles */
        .v-card { 
            display: flex; gap: 12px; margin-bottom: 12px; cursor: pointer; 
            padding: 8px; border-radius: 8px; transition: 0.2s;
        }
        .v-card:hover { background: var(--card-hover); }
        .v-card.active { background: var(--card-hover); border: 1px solid #3ea6ff; }
        
        .v-card .thumb { 
            width: 160px; height: 90px; background: #333; border-radius: 8px; 
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #777;
        }
        .v-card .info { font-size: 14px; font-weight: 500; line-height: 1.4; overflow: hidden; }

        /* Custom Scrollbar */
        .sidebar::-webkit-scrollbar { width: 8px; }
        .sidebar::-webkit-scrollbar-thumb { background: #717171; border-radius: 10px; }

        button.mode-btn {
            background: none; border: 1px solid var(--border); color: var(--text);
            padding: 5px 15px; border-radius: 20px; cursor: pointer;
        }

        @media (max-width: 1000px) {
            .container { flex-direction: column; }
            .sidebar { height: auto; }
        }

        a, a:link, a:visited, a:hover, a:active {
        color: white !important;
        text-decoration: none; /* Optional: removes the underline */
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><a href="../index.html"> Video Player </a> </div>
    <div class="search-area">
        <input type="text" id="search" placeholder="Search your library...">
    </div>
    <div class="header-actions">
        <button class="mode-btn" id="themeBtn">🌓 Mode</button>
    </div>
</header>

<div class="container">
    <div class="main-player">
        <video id="player" controls autoplay></video>
        <h2 id="videoTitle">Loading...</h2>
        <p id="status" style="color: #888; font-size: 14px;"></p>
    </div>
    <div class="sidebar" id="playlist">
        </div>
</div>

<script>
    const player = document.getElementById('player');
    const playlist = document.getElementById('playlist');
    const title = document.getElementById('videoTitle');
    const search = document.getElementById('search');
    const themeBtn = document.getElementById('themeBtn');
    const status = document.getElementById('status');
    
    let allVideos = [];
    let currentFile = "";

    // 1. Fetch the JSON file generated by your .sh / Python script
    // Added a timestamp (?t=) to prevent the browser from caching old lists
    fetch('videos.json?t=' + Date.now())
        .then(response => {
            if (!response.ok) throw new Error();
            return response.json();
        })
        .then(data => {
            allVideos = data;
            status.innerText = allVideos.length + " videos found in folder.";
            render(allVideos);
            if(allVideos.length > 0) play(allVideos[0]);
        })
        .catch(err => {
            title.innerText = "Error: videos.json not found!";
            status.innerText = "Please run your .sh rescan script on the Pi.";
        });

    // 2. Render the Playlist
    function render(list) {
        playlist.innerHTML = '';
        list.forEach((file) => {
            const card = document.createElement('div');
            card.className = 'v-card' + (file === currentFile ? ' active' : '');
            card.onclick = () => play(file);
            card.innerHTML = `
                <div class="thumb">VIDEO</div>
                <div class="info"><b>${file.replace(/\.[^/.]+$/, "")}</b></div>
            `;
            playlist.appendChild(card);
        });
    }

    // 3. Play Video Function
    function play(fileName) {
        currentFile = fileName;
        player.src = fileName;
        title.innerText = fileName.replace(/\.[^/.]+$/, "");
        
        // Highlight active video in sidebar
        const cards = document.querySelectorAll('.v-card');
        cards.forEach(c => c.classList.remove('active'));
        render(allVideos); // Refresh list to show active state
        
        player.play();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 4. Auto-Play Next Logic
    player.onended = () => {
        const currentIdx = allVideos.indexOf(currentFile);
        if (currentIdx !== -1 && currentIdx < allVideos.length - 1) {
            play(allVideos[currentIdx + 1]);
        }
    };

    // 5. Search Logic (Instant Filter)
    search.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allVideos.filter(v => v.toLowerCase().includes(term));
        render(filtered);
    });

    // 6. Theme Toggle Logic
    themeBtn.addEventListener('click', () => {
        const body = document.documentElement;
        if (body.getAttribute('data-theme') === 'light') {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'light');
        }
    });
</script>

</body>
</html>
