<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <script src="/auth.js"></script>

    <meta charset="UTF-8">
    <title>Photo Viewer</title>
    <style>
        :root { --bg: #0f0f0f; --text: #fff; --yt-red: #ff0000; --card: #272727; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }
        
        header { height: 56px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; }
        .logo { color: var(--yt-red); font-weight: bold; font-size: 20px; flex: 1; }
        #search { background: #121212; border: 1px solid #333; color: white; padding: 8px 20px; border-radius: 40px; width: 300px; outline: none; }

        .container { display: flex; height: calc(100vh - 57px); }
        
        /* Main Viewing Area */
        .viewer { flex: 3; display: flex; align-items: center; justify-content: center; background: #000; padding: 20px; position: relative; }
        #mainImage { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* Sidebar */
        .sidebar { flex: 1; min-width: 300px; background: var(--bg); border-left: 1px solid #333; overflow-y: auto; padding: 10px; }
        .img-card { display: flex; align-items: center; gap: 10px; padding: 8px; margin-bottom: 8px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .img-card:hover { background: var(--card); }
        .img-card img { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; background: #333; }
        .img-info { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        a, a:link, a:visited, a:hover, a:active {
        color: white !important;
        text-decoration: none; /* Optional: removes the underline */
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><a href="../index.html"> Photo Viewer </a></div>
    <input type="text" id="search" placeholder="Search photos...">
</header>

<div class="container">
    <div class="viewer">
        <img id="mainImage" src="" alt="Select an image">
    </div>

    <div class="sidebar" id="playlist">
        </div>
</div>

<script>
    const mainImage = document.getElementById('mainImage');
    const playlist = document.getElementById('playlist');
    const search = document.getElementById('search');
    let allImages = [];

    // Load the JSON generated by Python
    fetch('images.json?t=' + Date.now())
        .then(res => res.json())
        .then(data => {
            allImages = data;
            render(allImages);
            if(allImages.length > 0) view(allImages[0]);
        });

    function render(list) {
        playlist.innerHTML = '';
        list.forEach(file => {
            const card = document.createElement('div');
            card.className = 'img-card';
            card.onclick = () => view(file);
            card.innerHTML = `
                <img src="${file}">
                <div class="img-info">${file}</div>
            `;
            playlist.appendChild(card);
        });
    }

    function view(file) {
        mainImage.src = file;
    }

    search.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        render(allImages.filter(img => img.toLowerCase().includes(term)));
    });
</script>
</body>
</html>
