<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <script src="/auth.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Transfer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    :root { 
        --primary: #00d4ff; 
        --success: #00ff88;
        --bg: #0a0a0c; 
        --card: #16161a; 
    }
    
    body { 
        background: var(--bg); color: white; font-family: 'Inter', sans-serif;
        display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0;
        padding: 20px;
    }

    /* Make the container wider and more centered */
    .container { 
        width: 100%; 
        max-width: 800px; /* Increased from 600px */
        margin-top: 20px; 
    }

    h1 { font-weight: 200; letter-spacing: 3px; color: var(--primary); text-align: center; margin-bottom: 30px; }

    /* Fix the Folder Selector UI */
    .folder-selector { 
        margin-bottom: 20px; 
        display: flex; 
        flex-direction: column; 
        gap: 10px;
    }

    label { font-size: 14px; color: #888; margin-left: 5px; }

    #folder-dest {
        width: 100%;
        padding: 15px; /* Bigger padding */
        background: var(--card);
        color: var(--primary);
        border: 2px solid #333;
        border-radius: 12px;
        font-size: 16px; /* Larger text */
        cursor: pointer;
        transition: 0.3s;
    }

    #folder-dest:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }

    /* The Main Drop Zone */
    #drop-zone {
        background: var(--card);
        border: 2px dashed #444;
        border-radius: 24px;
        padding: 80px 20px; /* Tall padding for better drop target */
        text-align: center;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    #drop-zone.hover {
        border-color: var(--primary);
        background: rgba(0, 212, 255, 0.05);
        transform: scale(1.01);
    }

    .icon-box { font-size: 60px; color: #444; margin-bottom: 15px; }

    /* Progress Bar */
    .progress-container {
        width: 100%; height: 8px; background: #222; 
        border-radius: 10px; margin: 25px 0; display: none; overflow: hidden;
    }
    #progress-fill { height: 100%; width: 0%; background: var(--primary); transition: width 0.3s; }

    /* File List Activity */
    .file-card {
        background: var(--card); border-radius: 12px; padding: 15px;
        display: flex; align-items: center; margin-top: 10px;
        border-left: 4px solid var(--primary);
    }
    .file-info { flex-grow: 1; margin-left: 15px; }
    .file-name { font-weight: 600; font-size: 15px; }
    .file-meta { font-size: 12px; color: #666; }
</style>

<div class="container">
    <h1><i class="fa-solid fa-microchip"></i> Pi-Drop</h1>
    
    <div class="folder-selector">
        <label><i class="fa-solid fa-folder-tree"></i> Destination Folder</label>
        <select id="folder-dest">
            <option value="Main">/ Main (Root)</option>
            <option value="Plugins">{ } Plugins</option>
            <option value="Video">🎬 Video</option>
            <option value="Photo">🖼️ Photo</option>
            <option value="Music">♫ Music</option>
        </select>
    </div>

    <div id="drop-zone">
        <div id="drop-content">
            <div class="icon-box"><i class="fa-solid fa-cloud-arrow-up"></i></div>
            <div style="font-size: 18px; font-weight: 500;">Deploy to Pi</div>
            <div style="color: #666; font-size: 13px; margin-top: 10px;">Drag & Drop or Click to Browse</div>
        </div>

        <div id="done-content">
            <div class="icon-box"><i class="fa-solid fa-circle-check"></i></div>
            <div style="font-size: 20px; font-weight: 600;">Upload Complete!</div>
            <div style="color: var(--success); font-size: 13px; opacity: 0.8;">Files saved to /Documents</div>
        </div>
        
        <input type="file" id="file-input" multiple style="display: none;">
    </div>

    <div class="progress-container" id="p-container">
        <div id="progress-fill"></div>
    </div>
<br>
    <div class="history-header">
        <span>Recent Activity</span>
        <i class="fa-solid fa-clock-rotate-left"></i>
    </div>
    <div id="file-history">
        </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const dropContent = document.getElementById('drop-content');
    const doneContent = document.getElementById('done-content');
    const fileInput = document.getElementById('file-input');
    const pFill = document.getElementById('progress-fill');
    const pContainer = document.getElementById('p-container');
    const historyList = document.getElementById('file-history');

    // Load history when page opens
    window.onload = loadHistory;

    async function loadHistory() {
        try {
            const res = await fetch('/api/upload_history');
            const data = await res.json();
            historyList.innerHTML = ''; // Clear current
            data.forEach(file => {
                addFileToUI(file.name, file.date);
            });
        } catch (e) {
            console.log("No history found yet.");
        }
    }

    // Interaction Listeners
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleUpload(e.target.files);

    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('hover');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('hover');
        handleUpload(e.dataTransfer.files);
    };
            
        async function handleUpload(files) {
            if (files.length === 0) return;
            
            // Get the selected folder from the dropdown
            const selectedFolder = document.getElementById('folder-dest').value;
            
            pContainer.style.display = 'block';
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const progress = ((i + 1) / files.length) * 100;
                pFill.style.width = progress + '%';
                
                await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 
                        'X-File-Name': file.name,
                        'X-Folder': selectedFolder // <--- WE ADD THIS HEADER
                    },
                    body: file
                });
                
                // Add to UI history with the folder name
                addFileToUI(file.name, `${new Date().toLocaleTimeString()} to ${selectedFolder}`);
            }

            // Show "Done" UI
            dropContent.style.display = 'none';
            doneContent.style.display = 'block';
            
            loadHistory();

            setTimeout(() => {
                doneContent.style.display = 'none';
                dropContent.style.display = 'block';
                pContainer.style.display = 'none';
                pFill.style.width = '0%';
            }, 3000);
        }

        // Show "Done" UI
        dropContent.style.display = 'none';
        doneContent.style.display = 'block';
        
        // Refresh the history list
        loadHistory();

        // Reset the UI after 3 seconds
        setTimeout(() => {
            doneContent.style.display = 'none';
            dropContent.style.display = 'block';
            pContainer.style.display = 'none';
            pFill.style.width = '0%';
        }, 3000);

    function addFileToUI(name, date) {
        const html = `
            <div class="file-card">
                <i class="fa-regular fa-file-code" style="font-size: 24px; color: #444;"></i>
                <div class="file-info">
                    <div class="file-name">${name}</div>
                    <div class="file-meta">${date}</div>
                </div>
                <i class="fa-solid fa-check status-icon"></i>
            </div>
        `;
        historyList.insertAdjacentHTML('beforeend', html);
    }
</script>

</body>
</html>
