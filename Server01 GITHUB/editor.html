<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <script src="/auth.js"></script>

    <meta charset="UTF-8">
    <title>Pi OS Pro Editor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --bg: #0a0a0a; 
            --side: #161616; 
            --red: #ff3333; 
            --yellow: #ffee00; 
            --green: #00ff66; 
            --blue: #0099ff; 
            --text: #ffffff;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* HIGH CONTRAST NEON THEME OVERRIDES */
        .token.comment { color: #75715e; }
        .token.tag, .token.property { color: #f92672 !important; font-weight: bold; } /* Pink */
        .token.string, .token.attr-name { color: #a6e22e !important; } /* Green */
        .token.attr-value, .token.keyword { color: #66d9ef !important; font-weight: bold; } /* Cyan */
        .token.function { color: #e6db74 !important; } /* Yellow */
        .token.boolean, .token.number { color: #ae81ff !important; } /* Purple */

        /* SIDEBAR */
        .sidebar { width: 300px; background: var(--side); border-right: 2px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .search-box { padding: 12px; border-bottom: 1px solid #333; }
        #fileSearch { width: 100%; padding: 8px; background: #000; border: 1px solid #444; color: white; border-radius: 4px; outline: none; }
        #fileSearch:focus { border-color: var(--blue); }
        
        .filters { display: flex; gap: 4px; padding: 8px; flex-wrap: wrap; border-bottom: 1px solid #333; }
        .filter-pill { font-size: 10px; padding: 3px 8px; background: #222; border-radius: 4px; cursor: pointer; border: 1px solid #444; color: #aaa; }
        .filter-pill.active { background: var(--blue); border-color: white; color: white; }

        #fileList { flex: 1; overflow-y: auto; padding: 8px; }
        .file-item { padding: 8px; cursor: pointer; font-size: 13px; border-radius: 4px; display: flex; align-items: center; margin-bottom: 2px; }
        .file-item:hover { background: #222; }
        .active-file { background: #333 !important; border: 1px solid var(--blue); }

        .file-info { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .file-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .file-time { font-size: 9px; color: #777; margin-top: 2px; }
        .del-btn { display: none; color: var(--red); margin-left: 8px; font-size: 14px; }
        .file-item[data-type="txt"]:hover .del-btn { display: inline-block; }

        .create-btn { padding: 12px; background: #1a1a1a; text-align: center; cursor: pointer; border-top: 2px solid #333; font-weight: bold; font-size: 11px; color: var(--green); }

        /* HEADER (THE FIX) */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        header { 
            background: #111; 
            padding: 0 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #333;
            height: 45px; /* Slimmer header */
            flex-shrink: 0;
        }
        
        #fileName { 
            color: var(--yellow); 
            font-family: monospace; 
            font-weight: bold; 
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
        }

        .header-btns { display: flex; gap: 6px; flex-shrink: 0; }
        
        button { 
            border: none; 
            padding: 5px 10px; 
            cursor: pointer; 
            border-radius: 3px; 
            font-weight: bold; 
            font-size: 11px; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            white-space: nowrap;
        }
        .btn-scan { background: var(--red); color: white; }
        .btn-save { background: var(--yellow); color: black; }
        .btn-run { background: var(--green); color: black; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        /* EDITOR */
        .editor-wrapper { flex: 1; position: relative; overflow: hidden; }
        #editing, #highlighting { 
            margin: 0; padding: 20px; 
            width: 100%; height: 100%; 
            box-sizing: border-box; 
            font-family: 'Consolas', 'Monaco', monospace; 
            font-size: 15px; line-height: 1.5; 
            position: absolute; top: 0; left: 0; 
            white-space: pre; overflow: auto; 
            border: none; outline: none; 
        }
        #editing { z-index: 1; color: transparent; background: transparent; caret-color: #fff; resize: none; }
        #highlighting { z-index: 0; pointer-events: none; }
    
.file-actions { display: none; gap: 8px; margin-left: auto; padding-right: 5px; }
.file-item:hover .file-actions { display: flex; align-items: center; }
.file-actions i { cursor: pointer; opacity: 0.7; transition: 0.2s; }
.file-actions i:hover { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="search-box"><input type="text" id="fileSearch" placeholder="Search..." oninput="renderFiles()"></div>
    <div class="filters">
        <span class="filter-pill active" onclick="setFilter('all', this)">All</span>
        <span class="filter-pill" onclick="setFilter('.sh', this)">.sh</span>
        <span class="filter-pill" onclick="setFilter('.py', this)">.py</span>
        <span class="filter-pill" onclick="setFilter('.html', this)">.html</span>
        <span class="filter-pill" onclick="setFilter('.txt', this)">.txt</span>
    </div>
    <div id="fileList"></div>
    <div class="create-btn" onclick="createNewFile()"><i class="fa-solid fa-plus"></i> NEW DOCUMENT</div>
</div>

<div class="main">
    <header>
        <span id="fileName">SELECT A FILE</span>
        <div class="header-btns">
            <button class="btn-scan" onclick="api('/scan')"><i class="fa-solid fa-sync"></i> SCAN</button>
            <button class="btn-save" onclick="save()"><i class="fa-solid fa-save"></i> SAVE</button>
            <button id="runBtn" class="btn-run" onclick="run()" disabled><i class="fa-solid fa-play"></i> RUN</button>
        </div>
    </header>
    <div class="editor-wrapper">
        <pre id="highlighting" aria-hidden="true"><code id="highContent"></code></pre>
        <textarea id="editing" spellcheck="false" oninput="updateUI(this.value)" onscroll="syncScroll(this)"></textarea>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

<script>
        let allFiles = [], currentFilter = 'all', activeFile = "";
        const edit = document.getElementById('editing'), high = document.getElementById('highContent');

    async function createNewFile() {
        const filename = prompt("Enter new filename (e.g., script.py or index.html):");
        if (!filename) return;

        try {
            const response = await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    filename: filename, 
                    content: "" // Create as an empty file
                })
            });

            if (response.ok) {
                // Refresh the list and open the new file immediately
                await load(); 
                openFile(filename);
            } else {
                alert("❌ Failed to create file. Check if it already exists.");
            }
        } catch (err) {
            alert("❌ Error: " + err);
        }
    }

    async function load() {
        try {
            const res = await fetch('/api/files?t=' + Date.now());
            if (!res.ok) throw new Error("Server error");
            allFiles = await res.json();
            renderFiles();
        } catch (err) {
            console.error("Failed to load files:", err);
            document.getElementById('fileList').innerHTML = "<div style='color:red; padding:10px;'>Error loading files.</div>";
        }
    }

    function setFilter(ext, el) {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        currentFilter = ext;
        renderFiles();
    }

async function deleteFile(name, event) {
    event.stopPropagation(); 
    if (!confirm(`Are you sure you want to delete ${name}?`)) return;

    const res = await fetch('/api/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: name })
    });
    
    if (res.ok) {
        await load(); // Refresh list
        if(activeFile === name) {
            edit.value = "";
            document.getElementById('fileName').innerText = "FILE DELETED";
        }
    } else {
        alert("Delete failed. You can only delete .txt or .sh files.");
    }
}

async function renameFile(name, event) {
    event.stopPropagation();
    const newName = prompt("Enter new name for " + name, name);
    if (!newName || newName === name) return;

    const res = await fetch('/api/rename', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ oldName: name, newName: newName })
    });
    
    if (res.ok) {
        await load();
        if(activeFile === name) activeFile = newName;
    } else {
        alert("Rename failed. Check file extensions.");
    }
}

function renderFiles() {
    const q = document.getElementById('fileSearch').value.toLowerCase();
    
    const html = allFiles.filter(f => {
        // Filter by search text and file extension
        return f.name.toLowerCase().includes(q) && 
               (currentFilter === 'all' || f.name.endsWith(currentFilter));
    }).map(f => {
        const ext = f.name.split('.').pop();
        
        // SECURITY CHECK: Only show icons for .txt and .sh files
        const isEditable = f.name.endsWith('.txt') || f.name.endsWith('.sh');
        
        return `
        <div class="file-item ${f.name === activeFile ? 'active-file' : ''}" onclick="openFile('${f.name}')">
            <div class="file-info">
                <span class="file-name"><i class="fa-solid fa-file-code"></i> ${f.name}</span>
            </div>
            ${isEditable ? `
            <div class="file-actions">
                <i class="fa-solid fa-pen-to-square" onclick="renameFile('${f.name}', event)" title="Rename"></i>
                <i class="fa-solid fa-trash" onclick="deleteFile('${f.name}', event)" title="Delete" style="color:var(--red)"></i>
            </div>` : ''}
        </div>`;
    }).join('');
    
    document.getElementById('fileList').innerHTML = html;
}
    
    async function openFile(f) {
        activeFile = f;
        document.getElementById('fileName').innerText = f.toUpperCase();
        const response = await fetch(f + "?t=" + Date.now());
        const text = await response.text();
        edit.value = text;
        const langMap = { 'py': 'python', 'sh': 'bash', 'html': 'markup', 'css': 'css', 'js': 'javascript' };
        high.className = `language-${langMap[f.split('.').pop()] || 'none'}`;
        document.getElementById('runBtn').disabled = !f.endsWith('.sh');
        updateUI(text);
        renderFiles();
    }

    function updateUI(val) {
        high.textContent = val + (val.endsWith('\n') ? " " : "");
        Prism.highlightElement(high);
    }

    function syncScroll(el) {
        const h = document.getElementById('highlighting');
        h.scrollTop = el.scrollTop; h.scrollLeft = el.scrollLeft;
    }

    async function save() {
        if (!activeFile) return;
        try {
            const response = await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: activeFile, content: edit.value })
            });
            if (response.ok) {
                alert("✅ SUCCESS: " + activeFile + " saved!");
                load();
            } else {
                alert("❌ SAVE FAILED!");
            }
        } catch (err) { alert("❌ ERROR: " + err); }
    }

    async function run() {
        if (!activeFile) return;
        try {
            const res = await fetch('/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: activeFile })
            });
            const output = await res.text();
            alert("🚀 OUTPUT:\n" + output);
        } catch (err) { alert("❌ RUN ERROR: " + err); }
    }

    load();
</script>
</body>
</html>
