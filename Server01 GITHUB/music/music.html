<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <script src="/auth.js"></script>

    <meta charset="UTF-8">
    <title>Pi Music Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #0099ff; --pink: #f92672; --bg: #0a0a0a; --gray: #222; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        .folder-sidebar { width: 220px; background: #050505; border-right: 2px solid #333; padding: 20px 10px; display: flex; flex-direction: column; gap: 10px; }
        .folder-btn { background: var(--gray); border: 1px solid #444; color: #ccc; padding: 10px; border-radius: 6px; cursor: pointer; text-align: left; font-size: 13px; transition: 0.2s; }
        .folder-btn.active { border-color: var(--blue); color: white; background: rgba(0,153,255,0.1); }

        .tracklist-panel { width: 320px; background: #111; border-right: 2px solid #333; display: flex; flex-direction: column; padding: 20px; }
        .track-item { padding: 12px; margin-bottom: 5px; background: #1a1a1a; border-radius: 6px; cursor: pointer; border: 1px solid #333; font-size: 13px; }
        .active-track { border-color: var(--pink) !important; background: rgba(249,38,114,0.1); }

        .player-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .cover-container { width: 320px; height: 320px; background: #111; border: 2px solid #333; border-radius: 15px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #coverImg { width: 100%; height: 100%; object-fit: cover; display: none; }
        #coverPlaceholder { font-size: 100px; color: #222; }

        .now-playing { text-align: center; margin-bottom: 20px; max-width: 80%; }
        #trackName { font-size: 22px; font-weight: bold; color: var(--blue); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .controls { display: flex; gap: 20px; align-items: center; }
        .ctrl-btn { background: none; border: none; color: white; font-size: 25px; cursor: pointer; transition: 0.2s; opacity: 0.6; }
        .ctrl-btn:hover { opacity: 1; color: var(--pink); }
        .play-btn { font-size: 55px; color: var(--blue); opacity: 1; }
        .repeat-active { color: var(--pink) !important; opacity: 1; }

        .progress-container { width: 70%; margin-top: 25px; display: flex; align-items: center; gap: 15px; font-size: 12px; color: #888; }
        #progressBar { flex: 1; cursor: pointer; accent-color: var(--blue); }
        .back-btn { position: absolute; top: 20px; right: 20px; color: #555; text-decoration: none; }
    </style>
</head>
<body>

    <div class="folder-sidebar" id="folderList">
        <h2 style="font-size: 11px; color: #555; margin-left: 10px;">FOLDERS</h2>
        <button class="folder-btn active" id="btn-all" onclick="filterFolder('all')"><i class="fa-solid fa-layer-group"></i> All Music</button>
    </div>

    <div class="tracklist-panel">
        <h2 id="currentDirName" style="color: var(--pink); font-size: 14px; margin-bottom: 10px;">LIBRARY</h2>
        <input type="text" id="musicSearch" placeholder="Search songs..." oninput="searchSongs()" style="width:100%; padding:10px; background:#000; border:1px solid #444; color:white; border-radius:4px; margin-bottom:15px; outline:none;">
        <div id="trackList" style="overflow-y: auto; flex: 1;"></div>
    </div>

    <div class="player-main">
        <a href="/" class="back-btn"><i class="fa-solid fa-house"></i> EXIT</a>
        
        <div class="cover-container">
            <img id="coverImg" src="" alt="Cover Art">
            <i id="coverPlaceholder" class="fa-solid fa-music"></i>
        </div>

        <div class="now-playing">
            <div id="trackName">Select a Song</div>
            <div id="trackArtist" style="color:#444; font-size:14px; margin-top:5px;">Raspberry Pi Media</div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repeat Mode">
                <i class="fa-solid fa-repeat"></i>
            </button>
            <button class="ctrl-btn" onclick="prev()"><i class="fa-solid fa-backward-step"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-circle-play"></i></button>
            <button class="ctrl-btn" onclick="next()"><i class="fa-solid fa-forward-step"></i></button>
        </div>

        <div class="progress-container">
            <span id="curTime">0:00</span>
            <input type="range" id="progressBar" value="0" min="0" step="1">
            <span id="durTime">0:00</span>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const coverImg = document.getElementById('coverImg');
        const coverPlaceholder = document.getElementById('coverPlaceholder');
        
        let allFiles = [], currentPlaylist = [], currentIndex = 0;
        let repeatMode = 1; // Default to Repeat All (1)

        async function init() {
            const res = await fetch('/api/files');
            const files = await res.json();
            allFiles = files.filter(f => f.name.match(/\.(mp3|wav|ogg|flac)$/i));
            buildFolderMenu();
            filterFolder('all');
            updateRepeatUI();
        }

        function buildFolderMenu() {
            const menu = document.getElementById('folderList');
            const paths = new Set();
            allFiles.forEach(f => {
                const parts = f.name.split('/');
                if(parts.length > 1) { parts.pop(); paths.add(parts.join('/')); }
            });
            Array.from(paths).sort().forEach(path => {
                const btn = document.createElement('button');
                btn.className = 'folder-btn';
                btn.innerHTML = `<i class="fa-solid fa-folder"></i> ${path}`;
                btn.onclick = () => filterFolder(path, btn);
                menu.appendChild(btn);
            });
        }

        function filterFolder(path, btnElement) {
            document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            else document.getElementById('btn-all').classList.add('active');

            currentPlaylist = (path === 'all') ? [...allFiles] : allFiles.filter(f => f.name.startsWith(path));
            document.getElementById('currentDirName').innerText = path.toUpperCase();
            renderTracks(currentPlaylist);
        }

        function searchSongs() {
            const query = document.getElementById('musicSearch').value.toLowerCase();
            const filtered = currentPlaylist.filter(f => f.name.toLowerCase().includes(query));
            renderTracks(filtered);
        }

        function renderTracks(listToRender) {
            const list = document.getElementById('trackList');
            list.innerHTML = listToRender.map((s) => {
                const actualIndex = currentPlaylist.indexOf(s);
                return `<div class="track-item" id="track-${actualIndex}" onclick="playSong(${actualIndex})">
                    <i class="fa-solid fa-music" style="font-size:10px; opacity:0.3"></i> ${s.name.split('/').pop()}
                </div>`;
            }).join('');
        }

        function playSong(index) {
            currentIndex = index;
            const song = currentPlaylist[currentIndex];
            audio.src = '/' + song.name;
            document.getElementById('trackName').innerText = song.name.split('/').pop();
            
            // COVER LOGIC FOR .PNG
            const folderPath = song.name.substring(0, song.name.lastIndexOf('/'));
            updateCover(folderPath);

            document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active-track'));
            const activeEl = document.getElementById(`track-${index}`);
            if(activeEl) activeEl.classList.add('active-track');
            
            audio.play();
            playBtn.innerHTML = '<i class="fa-solid fa-circle-pause"></i>';
        }

        function updateCover(path) {
            const possibleCover = `/${path}/cover.png`;
            const img = new Image();
            img.onload = () => {
                coverImg.src = possibleCover;
                coverImg.style.display = 'block';
                coverPlaceholder.style.display = 'none';
            };
            img.onerror = () => {
                coverImg.style.display = 'none';
                coverPlaceholder.style.display = 'block';
            };
            img.src = possibleCover;
        }

        function toggleRepeat() {
            repeatMode = (repeatMode + 1) % 3;
            updateRepeatUI();
        }

        function updateRepeatUI() {
            repeatBtn.className = 'ctrl-btn' + (repeatMode > 0 ? ' repeat-active' : '');
            if (repeatMode === 0) repeatBtn.innerHTML = '<i class="fa-solid fa-repeat" style="opacity:0.3"></i>';
            else if (repeatMode === 1) repeatBtn.innerHTML = '<i class="fa-solid fa-repeat"></i>';
            else repeatBtn.innerHTML = '<i class="fa-solid fa-repeat-1"></i>';
        }

        audio.onended = () => {
            if (repeatMode === 2) {
                audio.currentTime = 0;
                audio.play();
            } else if (repeatMode === 1) {
                next(); // Cycles back to start automatically in next()
            } else if (currentIndex < currentPlaylist.length - 1) {
                next();
            }
        };

        function togglePlay() {
            if(!audio.src) return;
            if (audio.paused) { audio.play(); playBtn.innerHTML = '<i class="fa-solid fa-circle-pause"></i>'; }
            else { audio.pause(); playBtn.innerHTML = '<i class="fa-solid fa-circle-play"></i>'; }
        }

        function next() { 
            if(currentPlaylist.length === 0) return;
            currentIndex = (currentIndex + 1) % currentPlaylist.length;
            playSong(currentIndex);
        }

        function prev() { 
            if(currentPlaylist.length === 0) return;
            currentIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
            playSong(currentIndex);
        }

        audio.ontimeupdate = () => {
            document.getElementById('progressBar').value = audio.currentTime;
            document.getElementById('progressBar').max = audio.duration || 0;
            document.getElementById('curTime').innerText = formatTime(audio.currentTime);
            document.getElementById('durTime').innerText = formatTime(audio.duration);
        };
        document.getElementById('progressBar').oninput = (e) => { audio.currentTime = e.target.value; };
        function formatTime(sec) {
            if(isNaN(sec)) return "0:00";
            const m = Math.floor(sec/60), s = Math.floor(sec%60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        init();
    </script>
</body>
</html>
